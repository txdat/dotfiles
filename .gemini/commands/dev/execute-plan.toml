prompt = """
# /execute-plan — Implement the Approved Plan

Find plan from $ARGUMENTS or by status `approved`/`in-progress`. Set `in-progress`. Read `GEMINI.md`.

Partial: `<name> from <N>` starts at N; `<name> <N>` runs only N.

No `// TODO` — if blocked, say so.

## Dependency Analysis

- **Independent**: different files, no shared state → parallel batch
- **Sequential**: shared files or dependencies → ordered

Agent selection: `rapid-coder` if pattern exists, no edge cases, no security. Otherwise `dedicated-coder`.

## TDD Execution

**RED** (sequential):
- Feature/fix: write test, confirm FAILS. `🔴 Test N: <verifies>`
- Refactor: confirm existing tests PASS. `🔴 Coverage: <area>`

**GREEN**:

≤3 steps or all sequential → main agent. Otherwise write to `/tmp/gemini-ctx-<slug>.md`:
```
Plan: <path>
Stack: <detected>
Standards: <GEMINI.md>
Constraints: ONLY assigned steps. No TODO. Run ONLY assigned tests. Scope creep → STOP.
```

Spawn per batch:
```
Read /tmp/gemini-ctx-<slug>.md.
Steps: N, M. Files: <list>. Off-limits: <others>. Tests: <names>.
Report: completed, passing, blockers.
```

`🟢 Step N: <implemented>`

**BLUE** (main agent):
Phase 2 code only. Remove duplication, simplify — no behavior changes. `🔵 Refactor: <cleanup>`

## Test Commands

Maven `mvn test -pl <mod> -Dtest=<Class>` · Go `go test ./<pkg>/...` · Python `pytest <path> -q` · TS `npm test -- --testPathPattern=<file>`

## Scope Creep

Discovered work → STOP. Log under `## Discovered Scope` with size. Ask: include / separate / skip?

## Completion

All `[x]`: lint + build + targeted tests. Status → `implemented`. Suggest `/dev:review-code`.
"""
