prompt = """
# /simplify-code — Simplify Existing Code

Target from $ARGUMENTS or ask. Read target + `GEMINI.md`.

Scope: simplification only. No features, bug fixes, or behavior changes.

## Analysis

Single file → analyze directly. Otherwise, write to `/tmp/gemini-ctx-<slug>.md`:
```
Standards: <from GEMINI.md>
Scope: simplification only
```

Spawn `code-explorer` per file: "Read /tmp/gemini-ctx-<slug>.md. Analyze <file>. Find: dead code · redundant logic · premature abstractions · over-engineering. Per finding: file:line, why, simpler form."

## Apply

Present findings. Ask: "Apply all / pick / skip?"

Apply approved. Run targeted tests — if fail, revert and report.

Print: simplified, lines removed, test status.
"""
