apiVersion: helm.cattle.io/v1
kind: HelmChart
metadata:
  name: nfs
  namespace: default
spec:
  chart: nfs-subdir-external-provisioner
  repo: https://kubernetes-sigs.github.io/nfs-subdir-external-provisioner
  targetNamespace: default
  valuesContent: |-
    nfs:
      server: 192.168.1.198
      path: /home/public
      mountOptions:
        - nfsvers=4
    storageClass:
      name: nfs
      reclaimPolicy: Retain
